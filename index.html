<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: #FFFCF5; color: #0F3D47; -webkit-font-smoothing: antialiased; }

  @keyframes beamPulse {
    0%, 100% { opacity: 0.15; transform: translate(-50%,-50%) scale(1); }
    50% { opacity: 0.28; transform: translate(-50%,-50%) scale(1.1); }
  }
  @keyframes ringPulse {
    0%, 100% { opacity: 0.12; transform: translate(-50%,-50%) scale(1); }
    50% { opacity: 0.2; transform: translate(-50%,-50%) scale(1.04); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes shimmerBar {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  .anim-fadeup { animation: fadeUp 0.5s ease forwards; }
  .anim-fadeup-d1 { animation: fadeUp 0.5s ease 0.12s forwards; opacity: 0; }
  .anim-fadeup-d2 { animation: fadeUp 0.5s ease 0.24s forwards; opacity: 0; }
  .anim-fadeup-d3 { animation: fadeUp 0.5s ease 0.36s forwards; opacity: 0; }

  button { cursor: pointer; font-family: 'Inter', sans-serif; }
  input, textarea { font-family: 'Inter', sans-serif; }
  input:focus, textarea:focus { outline: none; }
  textarea { resize: none; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(15,61,71,0.18); border-radius: 99px; }

  .upload-zone {
    border: 2px dashed rgba(15,61,71,0.18);
    border-radius: 10px; padding: 36px;
    text-align: center; cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .upload-zone:hover, .upload-zone.drag-active {
    border-color: #F2B544;
    background: rgba(242,181,68,0.05);
  }

  .tab-btn {
    padding: 10px 22px; border: none;
    background: none; font-size: 13px; font-weight: 500;
    color: rgba(15,61,71,0.45);
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    cursor: pointer; white-space: nowrap;
    display: flex; align-items: center; gap: 7px;
  }
  .tab-btn.active { color: #0F3D47; border-bottom-color: #F2B544; }
  .tab-btn:hover:not(.active) { color: rgba(15,61,71,0.75); }

  .pl-row { transition: background 0.12s; }
  .pl-row:hover { background: rgba(15,61,71,0.025); }

  .proj-card {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    cursor: pointer;
  }
  .proj-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(15,61,71,0.12);
  }

  .cmt-item { transition: background 0.12s; }
  .cmt-item:hover { background: rgba(15,61,71,0.02); }

  .file-row { transition: background 0.12s; }
  .file-row:hover { background: rgba(15,61,71,0.03); }

  .btn-gold {
    background: #F2B544; color: #0F3D47;
    border: none; border-radius: 7px;
    font-weight: 700; letter-spacing: -0.01em;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-gold:hover { opacity: 0.88; transform: translateY(-1px); }

  .btn-dark {
    background: #0F3D47; color: #F2B544;
    border: none; border-radius: 7px;
    font-weight: 600;
    transition: opacity 0.15s;
  }
  .btn-dark:hover { opacity: 0.8; }

  @keyframes dotPulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }
  .dot-pulse { animation: dotPulse 2s ease-in-out infinite; }

  @keyframes scanline {
    0%   { transform: translateY(-100%); }
    100% { transform: translateY(400%); }
  }
  @keyframes goldGlow {
    0%, 100% { box-shadow: 0 0 18px rgba(242,181,68,0.18), 0 0 40px rgba(242,181,68,0.06); }
    50%       { box-shadow: 0 0 28px rgba(242,181,68,0.32), 0 0 60px rgba(242,181,68,0.12); }
  }
  @keyframes shimmerSweep {
    0%   { background-position: -200% center; }
    100% { background-position: 300% center; }
  }
  @keyframes countUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes progressFill {
    from { width: 0%; }
  }

  .resolve-card {
    display: flex; flex-direction: column;
    background: rgba(255,252,245,0.042);
    border: 1px solid rgba(255,252,245,0.09);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.25s, background 0.25s, transform 0.2s, box-shadow 0.25s;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    position: relative;
  }
  .resolve-card:hover:not(.disabled) {
    background: rgba(242,181,68,0.06);
    border-color: rgba(242,181,68,0.28);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(242,181,68,0.1), 0 2px 8px rgba(0,0,0,0.2);
  }
  .resolve-card.disabled { opacity: 0.42; cursor: not-allowed; transform: none; }
  .resolve-card.running {
    border-color: rgba(242,181,68,0.5);
    background: rgba(242,181,68,0.06);
    animation: goldGlow 2s ease-in-out infinite;
  }
  .resolve-card.done { border-color: rgba(74,222,128,0.35); background: rgba(74,222,128,0.05); }
  .resolve-card.error { border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.05); }
  .resolve-card.has-output { cursor: default; }

  .resolve-progress-bar {
    height: 2px;
    background: linear-gradient(90deg, #F2B544 0%, #FFD97A 50%, #F2B544 100%);
    background-size: 200% 100%;
    animation: shimmerSweep 1.4s linear infinite, progressFill 0.4s ease forwards;
    border-radius: 0;
  }

  .resolve-output {
    background: rgba(0,0,0,0.25);
    border-top: 1px solid rgba(255,252,245,0.07);
    padding: 16px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(255,252,245,0.65);
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 200px;
    overflow-y: auto;
    animation: countUp 0.3s ease forwards;
  }
  .resolve-output.error-text {
    color: #FCA5A5;
    background: rgba(239,68,68,0.08);
    border-top-color: rgba(239,68,68,0.15);
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(242,181,68,0.25);
    border-top-color: #F2B544;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    flex-shrink: 0;
  }
  .spinner-lg {
    width: 22px; height: 22px;
    border: 2.5px solid rgba(242,181,68,0.2);
    border-top-color: #F2B544;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }

  .status-bar-pill {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 5px 13px;
    border-radius: 99px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 500;
  }
  .status-bar-pill.connected { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.22); color: #4ade80; }
  .status-bar-pill.running   { background: rgba(242,181,68,0.12); border: 1px solid rgba(242,181,68,0.3); color: #F2B544; }
  .status-bar-pill.done      { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.22); color: #4ade80; }
  .status-bar-pill.error     { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.22); color: #FCA5A5; }

  .loading-screen {
    min-height: 100vh; background: #0F3D47;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 18px;
  }
  .error-banner {
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 8px; padding: 12px 16px;
    font-size: 13px; color: #FCA5A5;
    margin-bottom: 16px;
  }
</style>

const LoginView = ({ onLogin, err }) => {
  const [email,   setEmail]   = useState('');
  const [pw,      setPw]      = useState('');
  const [loading, setLoading] = useState(false);

  const attempt = async () => {
    if (!email || !pw) return;
    setLoading(true);
    await onLogin(email, pw);
    setLoading(false);
  };

  return (
    <div style={{
      minHeight:'100vh', background:T.dark,
      display:'flex', alignItems:'center', justifyContent:'center',
      position:'relative', overflow:'hidden',
    }}>
      <div style={{

        width:600, height:600, borderRadius:'50%',
        background:'radial-gradient(circle, rgba(242,181,68,0.1) 0%, transparent 65%)',
        animation:'beamPulse 4s ease-in-out infinite', pointerEvents:'none',
      }} />
      {[220,380,560,760].map((sz,i) => (
        <div key={i} style={{
          position:'absolute', top:'45%', left:'50%',
          width:sz, height:sz, borderRadius:'50%',
          border:`1px solid rgba(242,181,68,${0.1-i*0.02})`,
          animation:`ringPulse ${3+i*0.7}s ease-in-out ${i*0.5}s infinite`,
          pointerEvents:'none',
        }} />
      ))}

      <div className="anim-fadeup" style={{ position:'relative', zIndex:10, width:'100%', maxWidth:420, padding:'0 24px' }}>
        <div style={{ textAlign:'center', marginBottom:44 }}>
          <div style={{ fontFamily:"'Fraunces',serif", fontSize:48, fontWeight:900, letterSpacing:'-0.04em', lineHeight:0.9, color:T.bg }}>Lighthouse</div>
          <div style={{ fontFamily:"'Fraunces',serif", fontSize:48, fontWeight:900, fontStyle:'italic', letterSpacing:'-0.04em', lineHeight:1.0, color:T.gold }}>Studios</div>
          <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9, letterSpacing:'0.28em', textTransform:'uppercase', color:'rgba(255,252,245,0.25)', marginTop:12 }}>Client Studio Hub · Est. 2025 · Fort Myers, FL</div>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:12, marginTop:16 }}>
            <div style={{ height:1, width:60, background:'rgba(242,181,68,0.2)' }} />
            <div style={{ width:4, height:4, borderRadius:'50%', background:T.gold, opacity:0.5 }} />
            <div style={{ height:1, width:60, background:'rgba(242,181,68,0.2)' }} />
          </div>
        </div>

        <div className="anim-fadeup-d1" style={{
          background:'rgba(255,252,245,0.055)', backdropFilter:'blur(20px)',
          border:'1px solid rgba(255,252,245,0.09)', borderRadius:14, padding:'30px 30px 26px',
        }}>
          <div style={{ fontFamily:"'Fraunces',serif", fontSize:21, fontWeight:700, color:T.bg, letterSpacing:'-0.02em', marginBottom:4 }}>Welcome back</div>
          <div style={{ fontSize:13, color:'rgba(255,252,245,0.4)', marginBottom:26 }}>Sign in to access your project portal.</div>

          {err && <div className="error-banner" style={{ background:'rgba(239,68,68,0.14)', border:'1px solid rgba(239,68,68,0.28)', borderRadius:7, padding:'10px 14px', fontSize:13, color:'#FCA5A5', marginBottom:20 }}>{err}</div>}

          {[
            { label:'Email',    val:email, set:setEmail, type:'email',    ph:'you@example.com' },
            { label:'Password', val:pw,    set:setPw,    type:'password', ph:'••••••••' },
          ].map(({ label, val, set, type, ph }) => (
            <div key={label} style={{ marginBottom:16 }}>
              <MonoLabel size={9} gap={8} color='rgba(255,252,245,0.35)'>{label}</MonoLabel>
              <input
                type={type} value={val} placeholder={ph}
                onChange={e => set(e.target.value)}
                onKeyDown={e => e.key==='Enter' && attempt()}
                style={{
                  width:'100%', background:'rgba(255,252,245,0.07)',
                  border:'1px solid rgba(255,252,245,0.1)',
                  borderRadius:7, padding:'12px 14px', fontSize:14, color:T.bg,

                onFocus={e => e.target.style.borderColor='rgba(242,181,68,0.45)'}
                onBlur={e  => e.target.style.borderColor='rgba(255,252,245,0.1)'}
              />
            </div>
          ))}

          <button
            className="btn-gold" onClick={attempt} disabled={loading}
            style={{
              width:'100%', padding:'13px', fontSize:14, marginTop:10,
              display:'flex', alignItems:'center', justifyContent:'center', gap:8,
              opacity: loading ? 0.75 : 1,

          >
            {loading ? <><Spinner size={16} /><span>Entering…</span></> : 'Enter Studio →'}
          </button>
        </div>

const TimelineTab = ({ milestones }) => {

    </div>
  );
  return (
    <div style={{ padding:'28px 0' }}>
      {milestones.map((m, i) => {
        const isLast    = i === milestones.length - 1;
        const isCurrent = !m.done && (i===0 || milestones[i-1]?.done);
        return (
          <div key={i} style={{ display:'flex', gap:0 }}>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', width:44 }}>
              <div style={{
                width:20, height:20, borderRadius:'50%', flexShrink:0, zIndex:1,
                background: m.done ? T.mist : isCurrent ? T.gold : T.subtle,
                border:`2px solid ${m.done ? '#2A9090' : isCurrent ? T.gold : T.border}`,
                display:'flex', alignItems:'center', justifyContent:'center',
                boxShadow: isCurrent ? `0 0 0 5px ${T.goldLight}` : 'none',
              }}>
                {m.done && <svg width="9" height="9" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke={T.dark} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                {isCurrent && <div style={{ width:6, height:6, borderRadius:'50%', background:T.dark }} />}
              </div>
              {!isLast && <div style={{ width:1, flex:1, minHeight:28, background: m.done ? T.mist : T.border, margin:'3px 0' }} />}
            </div>
            <div style={{ paddingLeft:16, paddingBottom: isLast ? 0 : 28, flex:1 }}>
              <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:5, flexWrap:'wrap' }}>
                <div style={{ fontFamily:"'Fraunces',serif", fontSize:15.5, fontWeight:600, letterSpacing:'-0.01em', color: m.done ? T.mid : T.dark, textDecoration: m.done ? 'line-through' : 'none', textDecorationColor:'rgba(15,61,71,0.25)' }}>{m.name}</div>
                {isCurrent && <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:8.5, letterSpacing:'0.1em', textTransform:'uppercase', background:T.goldLight, color:'#8A6000', borderRadius:3, padding:'2px 7px' }}>Current Stage</span>}

const FilesTab = ({ files, onAdd }) => {
  const inputRef = useRef();
  const [drag, setDrag] = useState(false);

  const processFile = f => onAdd({
    id: Date.now(), name: f.name,
    size: f.size > 1e6 ? `${(f.size/1e6).toFixed(1)} MB` : `${Math.round(f.size/1024)} KB`,
    date: 'Just now',
    kind: f.type.startsWith('image') ? 'image' : f.type.includes('pdf') ? 'pdf' : f.type.startsWith('video') ? 'video' : 'doc',
    by: 'You',
  });

  return (
    <div style={{ padding:'28px 0' }}>
      <div
        className={`upload-zone ${drag ? 'drag-active' : ''}`}
        style={{ marginBottom:24 }}
        onClick={() => inputRef.current.click()}
        onDragOver={e => { e.preventDefault(); setDrag(true); }}
        onDragLeave={() => setDrag(false)}
        onDrop={e => { e.preventDefault(); setDrag(false); if(e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); }}
      >
        <input ref={inputRef} type="file" style={{ display:'none' }} onChange={e => e.target.files[0] && processFile(e.target.files[0])} />
        <div style={{ fontSize:28, marginBottom:10 }}>📁</div>
        <div style={{ fontFamily:"'Fraunces',serif", fontSize:16, fontWeight:700, color:T.dark, letterSpacing:'-0.01em', marginBottom:5 }}>Drop files here or click to upload</div>
        <div style={{ fontSize:12.5, color:T.mid }}>PDFs, images, videos, documents — any format</div>
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
        {files.map(f => (
          <div key={f.id} className="file-row" style={{ display:'flex', alignItems:'center', gap:14, background:T.white, border:`1px solid ${T.border}`, borderRadius:9, padding:'13px 16px' }}>
            <FileKindIcon kind={f.kind} />
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:13.5, fontWeight:600, color:T.dark, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{f.name}</div>
              <div style={{ fontSize:11.5, color:T.mid, marginTop:3 }}>{f.size} · {f.date} · {f.by}</div>
            </div>
            <button style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9, letterSpacing:'0.08em', background:T.subtle, color:T.mid, border:`1px solid ${T.border}`, borderRadius:5, padding:'6px 12px', transition:'all 0.15s' }}
              onMouseEnter={e => { e.target.style.background=T.goldLight; e.target.style.color='#8A6000'; e.target.style.borderColor=T.goldBorder; }}
              onMouseLeave={e => { e.target.style.background=T.subtle; e.target.style.color=T.mid; e.target.style.borderColor=T.border; }}
            >Download</button>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════
   COMMENTS TAB — fully live
═══════════════════════════════════════════════════════════ */
const CommentsTab = ({ comments, loading, error, onAdd, user }) => {
  const [text,       setText]       = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [submitErr,  setSubmitErr]  = useState('');
  const endRef = useRef();

  const submit = async () => {
    if (!text.trim() || submitting) return;
    setSubmitting(true);
    setSubmitErr('');
    const err = await onAdd(text.trim());
    if (err) {
      setSubmitErr(err);
    } else {
      setText('');
      setTimeout(() => endRef.current?.scrollIntoView({ behavior:'smooth' }), 50);
    }
    setSubmitting(false);
  };

  if (loading) return (
    <div style={{ padding:'40px 0', display:'flex', justifyContent:'center' }}>
      <Spinner size={24} />
    </div>
  );

  return (
    <div style={{ padding:'28px 0', display:'flex', flexDirection:'column', gap:10 }}>
      {error && <div className="error-banner">{error}</div>}

      {comments.length === 0 && (
        <div style={{ textAlign:'center', padding:'30px 0', color:T.mid }}>
          <div style={{ fontSize:13 }}>No messages yet. Start the conversation below.</div>
        </div>
      )}

      {comments.map(c => (
        <div key={c.id} className="cmt-item" style={{
          display:'flex', gap:14, padding:'15px 16px', borderRadius:10,
          background: c.role==='admin' ? 'rgba(157,191,184,0.08)' : T.white,
          border:`1px solid ${c.role==='admin' ? T.mistBorder : T.border}`,
        }}>
          <Avatar ini={c.ini || '?'} size={36} bg={c.role==='admin' ? T.dark : T.mist} />
          <div style={{ flex:1 }}>
            <div style={{ display:'flex', alignItems:'baseline', flexWrap:'wrap', gap:8, marginBottom:7 }}>
              <span style={{ fontSize:13.5, fontWeight:700, color:T.dark }}>{c.author}</span>
              <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:8.5, letterSpacing:'0.08em', textTransform:'uppercase', color: c.role==='admin' ? '#1A6060' : T.mid }}>
                {c.role==='admin' ? '⚡ Lighthouse Studios' : 'Client'}
              </span>
              <span style={{ fontSize:11.5, color:T.mid, marginLeft:'auto' }}>
                {c.created_at ? new Date(c.created_at).toLocaleDateString('en-US',{ month:'short', day:'numeric' }) + ' · ' + new Date(c.created_at).toLocaleTimeString('en-US',{ hour:'numeric', minute:'2-digit' }) : c.time || ''}
              </span>
            </div>
            <div style={{ fontSize:14, color:'rgba(15,61,71,0.8)', lineHeight:1.65 }}>{c.text}</div>
          </div>
        </div>
      ))}
      <div ref={endRef} />

      {submitErr && <div className="error-banner">{submitErr}</div>}

      <div style={{ marginTop:8, background:T.white, border:`1px solid ${T.border}`, borderRadius:12, overflow:'hidden' }}>
        <div style={{ display:'flex', alignItems:'flex-start', gap:12, padding:'14px 16px 10px' }}>
          <Avatar ini={user?.ini || '?'} size={30} />
          <textarea
            value={text}
            onChange={e => setText(e.target.value)}
            onKeyDown={e => { if(e.key==='Enter' && (e.metaKey||e.ctrlKey)) submit(); }}
            placeholder="Write a message or ask a question…"
            rows={3}
            style={{ flex:1, background:'transparent', border:'none', fontSize:14, color:T.dark, lineHeight:1.65, paddingTop:4 }}
          />
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'9px 16px', borderTop:`1px solid ${T.subtle}`, background:T.subtle }}>
          <span style={{ fontSize:11, color:T.mid }}>⌘↵ to send quickly</span>
          <button className="btn-dark" onClick={submit} disabled={submitting} style={{ padding:'8px 20px', fontSize:13, display:'flex', alignItems:'center', gap:8, opacity: submitting ? 0.7 : 1 }}>
            {submitting ? <><Spinner size={14} light /><span>Sending…</span></> : 'Send Message →'}
          </button>
        </div>
      </div>
    </div>
  );
};

const ProjectDetailView = ({ p, onBack, user, files, onAddFile }) => {
  const [tab,      setTab]      = useState('timeline');
  const [comments, setComments] = useState([]);
  const [cmtLoad,  setCmtLoad]  = useState(true);
  const [cmtErr,   setCmtErr]   = useState('');

  // Load comments when project opens or tab switches to comments
  useEffect(() => {
    if (!p?.id) return;
    const fetchComments = async () => {
      setCmtLoad(true);
      setCmtErr('');
      const { data, error } = await supabase
        .from('comments')
        .select('*')
        .eq('project_id', p.id)
        .order('created_at', { ascending: true });
      if (error) {
        setCmtErr('Failed to load comments. Please refresh.');
        console.error(error);
      } else {
        setComments(data || []);
      }
      setCmtLoad(false);
    };
    fetchComments();
  }, [p?.id]);

  const addComment = async (text) => {
    const { data, error } = await supabase
      .from('comments')
      .insert([{
        project_id: p.id,
        author:     user.name,
        ini:        user.ini,
        role:       user.role,
        text:       text,
        user_id:    user.id,
      }])
      .select()
      .single();

    if (error) {
      console.error(error);
      return error.message || 'Failed to send message.';
    }
    setComments(prev => [...prev, data]);
    return null; // null = success
  };

  if (!p) return null;

  return (
    <div style={{ background:T.bg, minHeight:'calc(100vh - 58px)' }}>
      <div style={{ background:T.dark, padding:'28px 40px 34px', position:'relative', overflow:'hidden' }}>
        <div style={{ position:'absolute', top:-80, right:-20, width:440, height:440, borderRadius:'50%', background:`radial-gradient(circle, ${p.accent_color || T.gold}18 0%, transparent 65%)`, pointerEvents:'none' }} />

        <button onClick={onBack} style={{
          background:'none', border:'none', padding:0,
          display:'flex', alignItems:'center', gap:6,
          fontFamily:"'JetBrains Mono',monospace", fontSize:9.5, letterSpacing:'0.12em', textTransform:'uppercase',
          color:'rgba(255,252,245,0.35)', marginBottom:22, transition:'color 0.15s',
        }}
          onMouseEnter={e => e.currentTarget.style.color='rgba(255,252,245,0.75)'}
          onMouseLeave={e => e.currentTarget.style.color='rgba(255,252,245,0.35)'}
        >← All Projects</button>

        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexWrap:'wrap', gap:18 }}>
          <div style={{ flex:1 }}>
            <div style={{ display:'flex', gap:8, alignItems:'center', flexWrap:'wrap', marginBottom:12 }}>
              <TypeChip type={p.type} />
              <StatusBadge status={p.status} />
            </div>
            <div style={{ fontFamily:"'Fraunces',serif", fontSize:30, fontWeight:900, color:T.bg, letterSpacing:'-0.035em', lineHeight:1.1, marginBottom:8 }}>{p.title}</div>
            <div style={{ fontSize:13.5, color:'rgba(255,252,245,0.45)', lineHeight:1.5, maxWidth:580 }}>
              <span style={{ color:'rgba(255,252,245,0.6)', fontWeight:600 }}>{p.client}</span>{p.description ? ` · ${p.description}` : ''}
            </div>
          </div>
          <div style={{ textAlign:'right', flexShrink:0 }}>
            <div style={{ fontFamily:"'Fraunces',serif", fontSize:50, fontWeight:900, letterSpacing:'-0.05em', lineHeight:1, color: p.status==='Delivered' ? '#4ade80' : T.gold }}>
              {p.progress}<span style={{ fontSize:20 }}>%</span>
            </div>
            <MonoLabel size={9} color='rgba(255,252,245,0.3)'>Complete</MonoLabel>
          </div>
        </div>

const callResolveAI = async (prompt) => {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      mcp_servers: [{ type:'url', url:'https://resolve.lighthousestudiosfl.com', name:'resolve-pipeline' }],
      messages: [{ role:'user', content: prompt }],
    }),
  });
  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API error ${response.status}`);
  }
  const data = await response.json();
  const textBlocks  = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
  const toolResults = (data.content||[]).filter(b=>b.type==='mcp_tool_result').map(b=>b.content?.[0]?.text||'').filter(Boolean).join('\n');
  return [textBlocks, toolResults].filter(Boolean).join('\n\n').trim() || 'Command completed successfully.';
};

const ResolveAIStudio = () => {
  const [states, setStates] = useState(() =>
    Object.fromEntries(RESOLVE_ACTIONS.map(a => [a.id, { status:'idle', output:'' }]))
  );
  const [anyRunning, setAnyRunning] = useState(false);
  const [globalStatus, setGlobalStatus] = useState({ kind:'connected', msg:'Pipeline connected', ts:'Ready' });
  const now = () => new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });

  const run = async (action) => {
    setAnyRunning(true);
    setStates(prev => ({ ...prev, [action.id]: { status:'running', output:'' } }));
    setGlobalStatus({ kind:'running', msg:`Running — ${action.label}`, ts:now() });
    try {
      const result = await callResolveAI(action.prompt);
      setStates(prev => ({ ...prev, [action.id]: { status:'done', output:result } }));
      setGlobalStatus({ kind:'done', msg:`Last action — ${action.label}`, ts:now() });
    } catch (err) {
      setStates(prev => ({ ...prev, [action.id]: { status:'error', output:err.message||'Connection failed.' } }));
      setGlobalStatus({ kind:'error', msg:`Error — ${action.label}`, ts:now() });
    } finally {
      setAnyRunning(false);
    }
  };

  const reset = id => setStates(prev => ({ ...prev, [id]: { status:'idle', output:'' } }));
  const globalDot = { connected:'#4ade80', running:T.gold, done:'#4ade80', error:'#f87171' }[globalStatus.kind];

  return (
    <div style={{ background:T.dark, borderRadius:18, overflow:'hidden', border:'1px solid rgba(255,252,245,0.1)', boxShadow:'0 24px 80px rgba(0,0,0,0.35)' }}>

        <div style={{ position:'relative', zIndex:1 }}>
          <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:16 }}>
            <div style={{ display:'flex', alignItems:'center', gap:16 }}>
              <div style={{ width:56, height:56, borderRadius:14, flexShrink:0, background:'linear-gradient(135deg, rgba(242,181,68,0.18) 0%, rgba(242,181,68,0.06) 100%)', border:'1px solid rgba(242,181,68,0.3)', display:'flex', alignItems:'center', justifyContent:'center' }}>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={T.gold} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
              </div>
              <div>
                <div style={{ fontFamily:"'Fraunces',serif", fontSize:26, fontWeight:900, letterSpacing:'-0.035em', lineHeight:1.05, color:T.bg }}>Resolve <span style={{ color:T.gold, fontStyle:'italic' }}>AI Studio</span></div>
                <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9, letterSpacing:'0.2em', textTransform:'uppercase', color:'rgba(255,252,245,0.28)', marginTop:5 }}>Powered by Resolve AI Pipeline · lighthousestudiosfl.com</div>
              </div>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:7, background:'rgba(74,222,128,0.08)', border:'1px solid rgba(74,222,128,0.2)', borderRadius:99, padding:'6px 14px', flexShrink:0 }}>
              <div style={{ width:7, height:7, borderRadius:'50%', background:'#4ade80', animation:'pulse 2s ease-in-out infinite' }} />
              <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9.5, letterSpacing:'0.12em', textTransform:'uppercase', color:'#4ade80', fontWeight:500 }}>Connected</span>

        </div>
      </div>

      <div style={{ padding:'10px 32px', borderTop:'1px solid rgba(255,252,245,0.06)', borderBottom:'1px solid rgba(255,252,245,0.06)', background:'rgba(0,0,0,0.18)', display:'flex', alignItems:'center', justifyContent:'space-between', gap:14 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>

      <div style={{ padding:'24px 32px 28px' }}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))', gap:14 }}>
          {RESOLVE_ACTIONS.map(action => {
            const st = states[action.id];
            const isRunning = st.status==='running', isDone = st.status==='done', isError = st.status==='error';
            const hasOutput = isDone||isError, isDisabled = anyRunning&&!isRunning;
            const iconColor = isRunning ? T.gold : isDone ? '#4ade80' : isError ? '#f87171' : 'rgba(255,252,245,0.55)';
            const iconBg    = isRunning ? 'rgba(242,181,68,0.12)' : isDone ? 'rgba(74,222,128,0.1)' : isError ? 'rgba(239,68,68,0.1)' : 'rgba(255,252,245,0.05)';

                  </div>
                  <div style={{ flex:1, minWidth:0, paddingTop:2 }}>
                    <div style={{ fontFamily:"'Fraunces',serif", fontSize:16, fontWeight:700, letterSpacing:'-0.02em', lineHeight:1.25, color: isRunning?T.gold:isDone?'#4ade80':isError?'#f87171':'rgba(255,252,245,0.92)', marginBottom:5 }}>
                      {isRunning ? <span style={{ display:'flex', alignItems:'center' }}>{action.label}<ThinkingDots /></span> : isDone ? `✓ ${action.label}` : isError ? `✗ ${action.label}` : action.label}
                    </div>
                    <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9.5, letterSpacing:'0.06em', color: hasOutput?'rgba(255,252,245,0.22)':'rgba(255,252,245,0.28)', lineHeight:1.5 }}>
                      {hasOutput ? 'Click to clear & reset' : action.subLabel}
                    </div>
                  </div>
                  <div style={{ flexShrink:0, paddingTop:4, fontFamily:"'JetBrains Mono',monospace", fontSize:13, color: isRunning?T.gold:isDone?'#4ade80':isError?'#f87171':'rgba(255,252,245,0.18)' }}>
                    {isRunning?'':isDone?'✓':isError?'!':'›'}
                  </div>
                </div>
                {hasOutput && <div className={`resolve-output ${isError?'error-text':''}`}>{st.output}</div>}
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ padding:'12px 32px', borderTop:'1px solid rgba(255,252,245,0.05)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9, letterSpacing:'0.14em', textTransform:'uppercase', color:'rgba(255,252,245,0.15)' }}>Internal use only · Lighthouse Studios</span>

      </div>
    </div>
  );
};

═══════════════════════════════════════════════════════════ */
const App = () => {
  const [view,       setView]       = useState('loading');
  const [user,       setUser]       = useState(null);
  const [projId,     setProjId]     = useState(null);
  const [isAdmin,    setIsAdmin]    = useState(false);
  const [loginErr,   setLoginErr]   = useState('');
  const [projects,   setProjects]   = useState([]);
  const [projLoad,   setProjLoad]   = useState(false);
  const [files,      setFiles]      = useState(INIT_FILES);

  // ── Map raw Supabase row → app shape ──
  const mapProject = row => ({
    id:           row.id,
    title:        row.title        || '',
    client:       row.client       || '',
    status:       row.status       || 'In Production',
    progress:     row.progress     || 0,
    due_date:     row.due_date     || '',
    description:  row.description  || '',
    type:         row.type         || 'Brand / Commercial',
    tier:         row.tier         || '',
    accent_color: row.accent_color || '#F2B544',
    shoot_date:   row.shoot_date   || '',
    milestones:   Array.isArray(row.milestones) ? row.milestones : [],
  });

  // ── Load projects from Supabase ──
  const loadProjects = useCallback(async () => {
    setProjLoad(true);
    const { data, error } = await supabase.from('projects').select('*').order('id');
    if (!error && data) setProjects(data.map(mapProject));
    else console.error('Projects load error:', error);
    setProjLoad(false);
  }, []);

  // ── Build user object from Supabase session + profile ──
  const buildUser = async (session) => {
    if (!session?.user) return null;
    const { data: profile } = await supabase
      .from('profiles')
      .select('name, ini, role')
      .eq('id', session.user.id)
      .single();
    return {
      id:    session.user.id,
      email: session.user.email,
      name:  profile?.name  || session.user.email,
      ini:   profile?.ini   || session.user.email[0].toUpperCase(),
      role:  profile?.role  || 'client',
    };
  };

  // ── On mount: restore session ──
  useEffect(() => {
    const init = async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        const u = await buildUser(session);
        setUser(u);
        await loadProjects();
        setView('dashboard');
      } else {
        setView('login');
      }
    };
    init();

    // Listen for auth state changes
    const { data: { subscription } } = supabase.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_OUT' || !session) {
        setUser(null);
        setProjects([]);
        setView('login');
      }
    });
    return () => subscription.unsubscribe();
  }, []);

  // ── Login ──
  const handleLogin = async (email, pw) => {
    setLoginErr('');
    const { data, error } = await supabase.auth.signInWithPassword({ email, password: pw });
    if (error) { setLoginErr(error.message); return; }
    const u = await buildUser(data.session);
    setUser(u);
    await loadProjects();
    setView('dashboard');
  };

  // ── Logout ──
  const handleLogout = async () => {
    await supabase.auth.signOut();
    setUser(null);
    setProjects([]);
    setProjId(null);
    setIsAdmin(false);
    setView('login');
  };

  const selectProject = id => { setProjId(id); setView('project'); setIsAdmin(false); };

  const toggleAdmin = () => {
    if (isAdmin) { setIsAdmin(false); setView('dashboard'); }
    else         { setIsAdmin(true);  setView('admin'); }
  };

  const addFile = (id, f) => setFiles(prev => ({ ...prev, [id]: [...(prev[id] || []), f] }));

  const proj = projects.find(p => p.id === projId) || null;

  if (view === 'loading') return <LoadingScreen />;

  return (
    <div>
      {view === 'login' && <LoginView onLogin={handleLogin} err={loginErr} />}

      {view !== 'login' && user && (
        <>
          <TopNav
            user={user}
            isAdmin={isAdmin}
            onToggleAdmin={toggleAdmin}
            onDashboard={() => { setView('dashboard'); setIsAdmin(false); }}
            onLogout={handleLogout}
          />

          {view === 'dashboard' && (
            <DashboardView user={user} projects={projects} loading={projLoad} onSelect={selectProject} />
          )}

          {view === 'project' && proj && (
            <ProjectDetailView
              p={proj}
              onBack={() => { setView('dashboard'); setIsAdmin(false); }}
              user={user}
              files={files[projId] || []}
              onAddFile={f => addFile(projId, f)}
            />
          )}

          {view === 'admin' && (
            <AdminView projects={projects} onSelect={selectProject} />
          )}
        </>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

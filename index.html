<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: #FFFCF5; color: #0F3D47; -webkit-font-smoothing: antialiased; }

  @keyframes beamPulse {
    0%, 100% { opacity: 0.15; transform: translate(-50%,-50%) scale(1); }
    50% { opacity: 0.28; transform: translate(-50%,-50%) scale(1.1); }
  }
  @keyframes ringPulse {
    0%, 100% { opacity: 0.12; transform: translate(-50%,-50%) scale(1); }
    50% { opacity: 0.2; transform: translate(-50%,-50%) scale(1.04); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes shimmerBar {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  .anim-fadeup { animation: fadeUp 0.5s ease forwards; }
  .anim-fadeup-d1 { animation: fadeUp 0.5s ease 0.12s forwards; opacity: 0; }
  .anim-fadeup-d2 { animation: fadeUp 0.5s ease 0.24s forwards; opacity: 0; }
  .anim-fadeup-d3 { animation: fadeUp 0.5s ease 0.36s forwards; opacity: 0; }

  button { cursor: pointer; font-family: 'Inter', sans-serif; }
  input, textarea { font-family: 'Inter', sans-serif; }
  input:focus, textarea:focus { outline: none; }
  textarea { resize: none; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(15,61,71,0.18); border-radius: 99px; }

  .upload-zone {
    border: 2px dashed rgba(15,61,71,0.18);
    border-radius: 10px; padding: 36px;
    text-align: center; cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .upload-zone:hover, .upload-zone.drag-active {
    border-color: #F2B544;
    background: rgba(242,181,68,0.05);
  }

  .tab-btn {
    padding: 10px 22px; border: none;
    background: none; font-size: 13px; font-weight: 500;
    color: rgba(15,61,71,0.45);
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    cursor: pointer; white-space: nowrap;
    display: flex; align-items: center; gap: 7px;
  }
  .tab-btn.active { color: #0F3D47; border-bottom-color: #F2B544; }
  .tab-btn:hover:not(.active) { color: rgba(15,61,71,0.75); }

  .pl-row { transition: background 0.12s; }
  .pl-row:hover { background: rgba(15,61,71,0.025); }

  .proj-card {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    cursor: pointer;
  }
  .proj-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(15,61,71,0.12);
  }

  .cmt-item { transition: background 0.12s; }
  .cmt-item:hover { background: rgba(15,61,71,0.02); }

  .file-row { transition: background 0.12s; }
  .file-row:hover { background: rgba(15,61,71,0.03); }

  .btn-gold {
    background: #F2B544; color: #0F3D47;
    border: none; border-radius: 7px;
    font-weight: 700; letter-spacing: -0.01em;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-gold:hover { opacity: 0.88; transform: translateY(-1px); }

  .btn-dark {
    background: #0F3D47; color: #F2B544;
    border: none; border-radius: 7px;
    font-weight: 600;
    transition: opacity 0.15s;
  }
  .btn-dark:hover { opacity: 0.8; }

  @keyframes dotPulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }
  .dot-pulse { animation: dotPulse 2s ease-in-out infinite; }

  /* ── Resolve AI Studio ── */
  @keyframes scanline {
    0%   { transform: translateY(-100%); }
    100% { transform: translateY(400%); }
  }
  @keyframes goldGlow {
    0%, 100% { box-shadow: 0 0 18px rgba(242,181,68,0.18), 0 0 40px rgba(242,181,68,0.06); }
    50%       { box-shadow: 0 0 28px rgba(242,181,68,0.32), 0 0 60px rgba(242,181,68,0.12); }
  }
  @keyframes shimmerSweep {
    0%   { background-position: -200% center; }
    100% { background-position: 300% center; }
  }
  @keyframes countUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes progressFill {
    from { width: 0%; }
  }

  .resolve-card {
    display: flex; flex-direction: column;
    background: rgba(255,252,245,0.042);
    border: 1px solid rgba(255,252,245,0.09);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.25s, background 0.25s, transform 0.2s, box-shadow 0.25s;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    position: relative;
  }
  .resolve-card:hover:not(.disabled) {
    background: rgba(242,181,68,0.06);
    border-color: rgba(242,181,68,0.28);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(242,181,68,0.1), 0 2px 8px rgba(0,0,0,0.2);
  }
  .resolve-card.disabled {
    opacity: 0.42; cursor: not-allowed; transform: none;
  }
  .resolve-card.running {
    border-color: rgba(242,181,68,0.5);
    background: rgba(242,181,68,0.06);
    animation: goldGlow 2s ease-in-out infinite;
  }
  .resolve-card.done {
    border-color: rgba(74,222,128,0.35);
    background: rgba(74,222,128,0.05);
  }
  .resolve-card.error {
    border-color: rgba(239,68,68,0.3);
    background: rgba(239,68,68,0.05);
  }
  .resolve-card.has-output {
    cursor: default;
  }

  .resolve-progress-bar {
    height: 2px;
    background: linear-gradient(90deg, #F2B544 0%, #FFD97A 50%, #F2B544 100%);
    background-size: 200% 100%;
    animation: shimmerSweep 1.4s linear infinite, progressFill 0.4s ease forwards;
    border-radius: 0;
  }

  .resolve-output {
    background: rgba(0,0,0,0.25);
    border-top: 1px solid rgba(255,252,245,0.07);
    padding: 16px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(255,252,245,0.65);
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 200px;
    overflow-y: auto;
    animation: countUp 0.3s ease forwards;
  }
  .resolve-output.error-text {
    color: #FCA5A5;
    background: rgba(239,68,68,0.08);
    border-top-color: rgba(239,68,68,0.15);
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(242,181,68,0.25);
    border-top-color: #F2B544;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    flex-shrink: 0;
  }
  .spinner-lg {
    width: 22px; height: 22px;
    border: 2.5px solid rgba(242,181,68,0.2);
    border-top-color: #F2B544;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }

  .status-bar-pill {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 5px 13px;
    border-radius: 99px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 500;
  }
  .status-bar-pill.connected {
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.22);
    color: #4ade80;
  }
  .status-bar-pill.running {
    background: rgba(242,181,68,0.12);
    border: 1px solid rgba(242,181,68,0.3);
    color: #F2B544;
  }
  .status-bar-pill.done {
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.22);
    color: #4ade80;
  }
  .status-bar-pill.error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.22);
    color: #FCA5A5;
  }
</style>

const FilesTab = ({ files, onAdd }) => {
  const inputRef  = useRef();
  const [drag, setDrag] = useState(false);

  const processFile = f => onAdd({
    id:Date.now(), name:f.name,
    size: f.size>1e6 ? `${(f.size/1e6).toFixed(1)} MB` : `${Math.round(f.size/1024)} KB`,
    date:'Just now',
    kind: f.type.startsWith('image') ? 'image' : f.type.includes('pdf') ? 'pdf' : f.type.startsWith('video') ? 'video' : 'doc',
    by:'You',
  });

  return (
    <div style={{ padding:'28px 0' }}>
      <div
        className={`upload-zone ${drag ? 'drag-active' : ''}`}
        style={{ marginBottom:24 }}
        onClick={() => inputRef.current.click()}
        onDragOver={e => { e.preventDefault(); setDrag(true); }}
        onDragLeave={() => setDrag(false)}
        onDrop={e => { e.preventDefault(); setDrag(false); if(e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); }}
      >
        <input ref={inputRef} type="file" style={{ display:'none' }} onChange={e => e.target.files[0] && processFile(e.target.files[0])} />
        <div style={{ fontSize:28, marginBottom:10 }}>📁</div>
        <div style={{
          fontFamily:"'Fraunces',serif",
          fontSize:16, fontWeight:700, color:T.dark, letterSpacing:'-0.01em', marginBottom:5,
        }}>Drop files here or click to upload</div>
        <div style={{ fontSize:12.5, color:T.mid }}>PDFs, images, videos, documents — any format</div>
      </div>

      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
        {files.map(f => (
          <div key={f.id} className="file-row" style={{
            display:'flex', alignItems:'center', gap:14,
            background:T.white, border:`1px solid ${T.border}`,
            borderRadius:9, padding:'13px 16px',
          }}>
            <FileKindIcon kind={f.kind} />
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{
                fontSize:13.5, fontWeight:600, color:T.dark,
                whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
              }}>{f.name}</div>
              <div style={{ fontSize:11.5, color:T.mid, marginTop:3 }}>
                {f.size} · {f.date} · {f.by}
              </div>
            </div>
            <button style={{
              fontFamily:"'JetBrains Mono',monospace",
              fontSize:9, letterSpacing:'0.08em',
              background:T.subtle, color:T.mid,
              border:`1px solid ${T.border}`, borderRadius:5, padding:'6px 12px',
              transition:'all 0.15s',
            }}
              onMouseEnter={e => { e.target.style.background=T.goldLight; e.target.style.color='#8A6000'; e.target.style.borderColor=T.goldBorder; }}
              onMouseLeave={e => { e.target.style.background=T.subtle; e.target.style.color=T.mid; e.target.style.borderColor=T.border; }}

          </div>
        ))}
      </div>
    </div>
  );
};

const callResolveAI = async (prompt) => {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      mcp_servers: [{ type: 'url', url: 'https://resolve.lighthousestudiosfl.com', name: 'resolve-pipeline' }],
      messages: [{ role: 'user', content: prompt }],
    }),
  });
  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API error ${response.status}`);
  }
  const data = await response.json();
  const textBlocks = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
  const toolResults = (data.content || []).filter(b => b.type === 'mcp_tool_result').map(b => b.content?.[0]?.text || '').filter(Boolean).join('\n');
  return [textBlocks, toolResults].filter(Boolean).join('\n\n').trim() || 'Command completed successfully.';
};

const ResolveAIStudio = () => {
  const [states, setStates] = useState(() =>
    Object.fromEntries(RESOLVE_ACTIONS.map(a => [a.id, { status: 'idle', output: '' }]))
  );
  const [anyRunning, setAnyRunning] = useState(false);
  // Global status bar: { kind: 'connected'|'running'|'done'|'error', msg: string, ts: string }
  const [globalStatus, setGlobalStatus] = useState({ kind: 'connected', msg: 'Pipeline connected', ts: 'Ready' });

  const now = () => new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  const run = async (action) => {
    setAnyRunning(true);
    setStates(prev => ({ ...prev, [action.id]: { status: 'running', output: '' } }));
    setGlobalStatus({ kind: 'running', msg: `Running — ${action.label}`, ts: now() });
    try {
      const result = await callResolveAI(action.prompt);
      setStates(prev => ({ ...prev, [action.id]: { status: 'done', output: result } }));
      setGlobalStatus({ kind: 'done', msg: `Last action — ${action.label}`, ts: now() });
    } catch (err) {
      setStates(prev => ({ ...prev, [action.id]: { status: 'error', output: err.message || 'Connection failed.' } }));
      setGlobalStatus({ kind: 'error', msg: `Error — ${action.label}`, ts: now() });
    } finally {
      setAnyRunning(false);
    }
  };

  const reset = (id) => setStates(prev => ({ ...prev, [id]: { status: 'idle', output: '' } }));

  const globalDot = { connected: '#4ade80', running: T.gold, done: '#4ade80', error: '#f87171' }[globalStatus.kind];

                  {/* Icon box */}
                  <div style={{
                    width: 48, height: 48, borderRadius: 12, flexShrink: 0,
                    background: iconBg, border: `1px solid ${iconBorder}`,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    transition: 'all 0.25s',
                  }}>
                    {isRunning ? <div className="spinner-lg" /> : action.svgIcon(iconColor)}
                  </div>

                  {/* Text */}
                  <div style={{ flex: 1, minWidth: 0, paddingTop: 2 }}>
                    <div style={{
                      fontFamily: "'Fraunces',serif",
                      fontSize: 16, fontWeight: 700,
                      letterSpacing: '-0.02em', lineHeight: 1.25,
                      color: isRunning ? T.gold : isDone ? '#4ade80' : isError ? '#f87171' : 'rgba(255,252,245,0.92)',
                      marginBottom: 5, transition: 'color 0.2s',
                    }}>
                      {isRunning
                        ? <span style={{ display: 'flex', alignItems: 'center', gap: 0 }}>
                            {action.label}<ThinkingDots />
                          </span>
                        : isDone  ? `✓ ${action.label}`
                        : isError ? `✗ ${action.label}`
                        : action.label}
                    </div>
                    <div style={{
                      fontFamily: "'JetBrains Mono',monospace",
                      fontSize: 9.5, letterSpacing: '0.06em',
                      color: hasOutput ? 'rgba(255,252,245,0.22)' : 'rgba(255,252,245,0.28)',
                      lineHeight: 1.5,
                    }}>
                      {hasOutput ? 'Click to clear & reset' : action.subLabel}
                    </div>
                  </div>

                  {/* Right chevron / status mark */}
                  <div style={{
                    flexShrink: 0, paddingTop: 4,
                    fontFamily: "'JetBrains Mono',monospace",
                    fontSize: 13,
                    color: isRunning ? T.gold : isDone ? '#4ade80' : isError ? '#f87171' : 'rgba(255,252,245,0.18)',
                    transition: 'color 0.2s',
                  }}>
                    {isRunning ? '' : isDone ? '✓' : isError ? '!' : '›'}
                  </div>
                </div>

                {/* Output panel — inlined inside card */}
                {hasOutput && (
                  <div className={`resolve-output ${isError ? 'error-text' : ''}`}>
                    {st.output}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* ── Footer ── */}
      <div style={{
        padding: '12px 32px',
        borderTop: '1px solid rgba(255,252,245,0.05)',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <span style={{
          fontFamily: "'JetBrains Mono',monospace",
          fontSize: 9, letterSpacing: '0.14em', textTransform: 'uppercase',
          color: 'rgba(255,252,245,0.15)',
        }}>
          Internal use only · Lighthouse Studios
        </span>
        <span style={{
          fontFamily: "'JetBrains Mono',monospace",
          fontSize: 9, letterSpacing: '0.1em',
          color: 'rgba(255,252,245,0.12)',
        }}>
          resolve.lighthousestudiosfl.com
        </span>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════ */
const App = () => {
  const [view,    setView]    = useState('login');
  const [user,    setUser]    = useState(null);
  const [projId,  setProjId]  = useState(null);
  const [isAdmin, setIsAdmin] = useState(false);
  const [loginErr, setLoginErr] = useState('');

  const [comments, setComments] = useState(INIT_COMMENTS);
  const [files,    setFiles]    = useState(INIT_FILES);
const [projects, setProjects] = useState([]);

useEffect(() => {
  const loadProjects = async () => {
    const { data, error } = await supabase
      .from('projects')
      .select('*');

    if (error) {
      console.error(error);
      return;
    }

    setProjects(
      data.map(project => ({
        id: project.id,
        title: project.Title,
client: project.Client,
status: project.Status,
progress: project.Progress,
dueDate: project.Due_Date,
desc: project.Description,
        type: 'Brand / Commercial',
        tier: 'Growth',
        accentColor: '#F2B544',
        milestones: [],
      }))
    );
  };

  loadProjects();
}, []);
  const handleLogin = async (email, pw) => {
  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password: pw,
  });

  if (error) {
    setLoginErr(error.message);
    return;
  }

  setUser({
    name: email,
    email: email,
    role: 'admin',
    ini: email[0].toUpperCase(),
  });

  setLoginErr('');
  setView('dashboard');
};

  const selectProject = id => { setProjId(id); setView('project'); setIsAdmin(false); };

  const toggleAdmin = () => {
    if (isAdmin) { setIsAdmin(false); setView('dashboard'); }
    else         { setIsAdmin(true);  setView('admin'); }
  };

  const addComment = (id, c) => setComments(prev => ({ ...prev, [id]:[...(prev[id]||[]), c] }));
  const addFile    = (id, f) => setFiles(prev =>    ({ ...prev, [id]:[...(prev[id]||[]), f] }));

  const proj = projects.find(p => p.id === projId);

  return (
    <div>
      {view === 'login' && <LoginView onLogin={handleLogin} err={loginErr} />}

      {view !== 'login' && user && <>
        <TopNav
          user={user}
          isAdmin={isAdmin}
          onToggleAdmin={toggleAdmin}
          onDashboard={() => { setView('dashboard'); setIsAdmin(false); }}
        />

        {view === 'dashboard' && (
          <DashboardView user={user} projects={projects} onSelect={selectProject} />
        )}

        {view === 'project' && proj && (
          <ProjectDetailView
            p={proj}
            onBack={() => { setView('dashboard'); setIsAdmin(false); }}
            user={user}
            comments={comments[projId] || []}
            files={files[projId] || []}
            onAddComment={c => addComment(projId, c)}
            onAddFile={f => addFile(projId, f)}
          />
        )}

        {view === 'admin' && (
          <AdminView projects={PROJECTS} onSelect={selectProject} />
        )}
      </>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
